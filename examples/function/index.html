<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>业务能力目录 · PoC 03</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px;line-height:1.5}
header{background:#1e40af;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:18px;font-weight:600}
header span{font-size:13px;opacity:.8}
.subhead{background:#e0e7ff;padding:10px 24px;font-size:13px;color:#1e40af;display:flex;gap:24px;flex-wrap:wrap}
.main{display:flex;gap:1px;background:#d1d9e6;height:calc(100vh - 110px)}
.col{background:#fff;display:flex;flex-direction:column}
.col-left{width:44%;min-width:320px;border-right:1px solid #e2e8f0}
.col-right{width:56%;min-width:380px}
.phead{padding:12px 20px;border-bottom:1px solid #e2e8f0;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#f8fafc}
.scroll{flex:1;overflow-y:auto;padding:12px 16px}
.card{padding:12px 16px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.card:hover{border-color:#93c5fd}
.card.sel{border-color:#3b82f6;background:#eff6ff;border-left:3px solid #3b82f6;padding-left:13px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;color:#fff;margin:1px}
.badge-b{background:#1e40af}
.badge-f{background:#64748b}
.badge-office{background:#e2e8f0;color:#475569;font-size:11px;padding:1px 6px;border-radius:3px;margin-left:4px}
.card-title{font-weight:600;font-size:15px;margin:4px 0 6px}
.card-desc{font-size:13px;color:#64748b}
.card-footer{font-size:12px;color:#94a3b8;margin-top:6px;display:flex;gap:12px;flex-wrap:wrap}
.tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:12px;margin:2px 2px 2px 0;transition:all .2s}
.tag-f{background:#e0e7ff;color:#1e40af;border:1px solid transparent}
.tag-f.hl{background:#fef3c7;border-color:#f59e0b;color:#92400e}
.tag-b{background:#dbeafe;color:#1e40af;border:1px solid transparent}
.tag-b.hl{background:#fef3c7;border-color:#f59e0b;color:#92400e}
</style>
</head>
<body>

<header>
  <h1>业务能力目录</h1>
  <span>PoC 03 — 业务 × 职能 映射</span>
</header>

<div class="subhead">
  <span><strong>3</strong> 个业务</span>
  <span><strong>5</strong> 个标准职能</span>
  <span><strong>3</strong> 个办公室</span>
</div>

<div class="main">
  <div class="col col-left">
    <div class="phead"><span>业务线</span><span style="font-weight:400;color:#94a3b8;font-size:12px">对外服务</span></div>
    <div class="scroll" id="biz-list"></div>
  </div>
  <div class="col col-right">
    <div class="phead"><span>标准职能</span><span style="font-weight:400;color:#94a3b8;font-size:12px">内部能力 · 选中业务高亮</span></div>
    <div class="scroll" id="func-list"></div>
  </div>
</div>

<script>
const BIZ = [
  {id:'B01',name:'企业培训方案',desc:'为客户提供定制化培训服务',funcs:['F01','F04'],office:'秘书处办牵头'},
  {id:'B02',name:'数字化转型咨询',desc:'为企业提供数字化诊断和转型方案',funcs:['F02','F05'],office:'COO办牵头'},
  {id:'B03',name:'SaaS产品交付',desc:'基于标准产品为客户提供 SaaS 服务',funcs:['F03','F05','F04'],office:'CTO办牵头'}
];

const FUNCS = [
  {id:'F01',name:'课程研发',office:'秘书处办',input:'课程大纲',output:'课件/教材/习题'},
  {id:'F02',name:'咨询服务',office:'COO办',input:'客户需求',output:'咨询方案/报告'},
  {id:'F03',name:'产品开发',office:'CTO办',input:'产品需求',output:'MVP/文档'},
  {id:'F04',name:'市场推广',office:'COO办',input:'产品/课程',output:'获客线索'},
  {id:'F05',name:'技术支持',office:'CTO办',input:'技术需求',output:'平台/工具'}
];

let selectedBiz = 'B01';

function renderBiz() {
  const el = document.getElementById('biz-list');
  el.innerHTML = BIZ.map(b => {
    const sel = b.id === selectedBiz ? 'sel' : '';
    return `<div class="card ${sel}" onclick="select('${b.id}')">
      <span class="badge badge-b">业务</span>
      <span class="badge-office">${b.office}</span>
      <div class="card-title">${b.name}</div>
      <div class="card-desc">${b.desc}</div>
      <div class="card-footer">
        <span>所需职能</span>
        ${b.funcs.map(fid => {
          const f = FUNCS.find(x => x.id === fid);
          return f ? `<span class="tag tag-f">${f.name}</span>` : '';
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderFuncs() {
  const el = document.getElementById('func-list');
  const biz = BIZ.find(b => b.id === selectedBiz);
  const hlSet = biz ? new Set(biz.funcs) : new Set();
  el.innerHTML = FUNCS.map(f => {
    const hl = hlSet.has(f.id);
    return `<div class="card ${hl?'hl':''}">
      <span class="badge badge-f">职能</span>
      <span class="badge-office">${f.office}</span>
      <div class="card-title">${f.name} ${hl ? '←' : ''}</div>
      <div class="card-footer">
        <span>${f.input} → ${f.output}</span>
      </div>
    </div>`;
  }).join('');
}

function select(id) {
  selectedBiz = id;
  renderBiz();
  renderFuncs();
}

renderBiz();
renderFuncs();
</script>
</body>
</html>
